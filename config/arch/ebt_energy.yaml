# EBT mode: explicit energy-based refinement via MCMC in hidden space
# Pure MCMC from input_embeddings — no URM recurrence steps
# Energy convergence stopping, energy-based pass@K ranking

name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy

loops: 8
inner_loops: 1
num_layers: 2
hidden_size: 64
num_heads: 4
expansion: 4

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

# Energy stopping
energy_threshold: 0.005
min_steps: 8

# Operational mode
refinement: ebt
stopping: energy
ranking: energy
mcmc_steps: 8
mcmc_step_size: 0.01
mcmc_training: true

ema: True
ema_rate: 0.999
