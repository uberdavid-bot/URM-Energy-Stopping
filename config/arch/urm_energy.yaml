name: urm.urm_energy@URM_Energy
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy

loops: 16
# num_layers: 8
num_layers: 4
hidden_size: 512
num_heads: 8
expansion: 4

H_cycles: 4
L_cycles: 3

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

# Energy-specific
energy_threshold: 0.005
min_steps: 8

# Enable timing profile output during training for debugging
profile: false

ema: True
ema_rate: 0.999
