# MCMC refinement with second-order gradients
# URM recurrence → MCMC refinement via energy gradients → reconstruction loss
# Gradients flow back through MCMC into energy head

name: urm.urm_energy@URM_Energy
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy

loops: 16
num_layers: 2
hidden_size: 128
num_heads: 4
expansion: 4

H_cycles: 2
L_cycles: 4

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

# Energy stopping (training only, eval uses fixed loops)
energy_threshold: 0.05
min_steps: 8

# MCMC refinement
mcmc_steps: 4
mcmc_step_size: 0.01
mcmc_training: true

# Loss weights
contrastive_weight: 0.5
contrastive_margin: 0.5

# Dual reconstruction loss: train on both unrefined and refined logits
# Unrefined loss gives clean URM learning signal; refined loss trains energy head
unrefined_loss_weight: 0.5
refined_loss_weight: 0.5

# Inference refinement disabled until energy head is well-trained
refine_steps: 0
refine_step_size: 0.01

ema: True
ema_rate: 0.999
