# Trajectory-supervised energy function (Option A)
# Energy trained via ranking loss on URM inner recurrence trajectory
# MCMC refinement at inference only (no second-order gradients during training)

name: urm.urm_energy@URM_Energy
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy

loops: 16
num_layers: 2
hidden_size: 128
num_heads: 4
expansion: 4

H_cycles: 2
L_cycles: 4

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

# Energy stopping (training only)
energy_threshold: 0.05
min_steps: 8

# Trajectory supervision
trajectory_loss_weight: 1.0
trajectory_margin: 0.1
trajectory_max_steps: 4

# Contrastive loss (keep as auxiliary, reduced weight)
contrastive_weight: 0.5
contrastive_margin: 0.5

# DSM disabled
dsm_weight: 0.0
dsm_noise_scales: [0.1, 0.3, 0.5, 1.0]

# MCMC at inference only
mcmc_steps: 0
mcmc_step_size: 0.01
mcmc_training: false
refine_steps: 4
refine_step_size: 0.01

# No second-order gradients during training
unrefined_loss_weight: 1.0
refined_loss_weight: 0.0

ema: True
ema_rate: 0.999
