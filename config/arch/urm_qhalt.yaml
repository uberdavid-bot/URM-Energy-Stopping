# Experiment R1: Right-sized URM baseline for iterative refinement comparison
# depth=2, hidden=64, 8 recurrence steps, 10x10 grids
# Goal: model should need most of its step budget to converge

name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy

loops: 8
num_layers: 2
hidden_size: 64
num_heads: 4
expansion: 4

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

# Energy stopping
energy_threshold: 0.005
min_steps: 8

# Operational mode
refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
