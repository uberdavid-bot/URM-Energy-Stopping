# Experiment R1d: 15x15 grids at h=128 exp=4 — harder problem, known-good model
# depth=2, hidden=128, 4 heads, expansion=4, 8 recurrence steps, 15x15 grids (225 tokens)
# Same model as Exp 0 baseline but on harder grids

name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy

loops: 8
num_layers: 2
hidden_size: 128
num_heads: 4
expansion: 4

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

# Energy stopping
energy_threshold: 0.005
min_steps: 8

# Operational mode
refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
