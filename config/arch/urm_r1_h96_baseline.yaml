# R1-h96: Baseline URM at h=96, depth=1, exp=2
# Tests whether h=96 still has multi-step convergence with deep supervision
# Scaled up from R1i (h=64, 5.33% eval exact)
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 96
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
