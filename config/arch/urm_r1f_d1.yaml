# Experiment R1f: depth=1 — single transformer layer per recurrence step
# depth=1, hidden=128, 4 heads, expansion=2, 8 recurrence steps, 10x10 grids
# ~164K transformer params (vs ~330K at depth=2, ~530K baseline)
# Hypothesis: depth=2 provides too much processing per step, causing one-step convergence.
# A single layer per step should force multi-step computation distribution.

name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

# Energy stopping
energy_threshold: 0.005
min_steps: 8

# Operational mode
refinement: urm
stopping: qhalt
ranking: qhalt
mcmc_steps: 0
mcmc_training: false

ema: True
ema_rate: 0.999
