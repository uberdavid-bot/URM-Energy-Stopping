# R2b: URM + trajectory ranking loss on dropout-regularized backbone
# Same as R2 but with attn_dropout=0.1, mlp_dropout=0.1 from R1i
# Re-testing energy head generalization now that backbone overfitting is reduced.

name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.1
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 64
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
