# R2c: Position-aware energy head — per-position MLP → sum (~2K new params)
# Tests whether preserving spatial info fixes energy ranking failure.
# Same backbone/training as R2b, only energy head architecture changes.

name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.1
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 64
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

energy_head_type: position_mlp
energy_head_hidden: 32

ema: True
ema_rate: 0.999
