# R2g-h96: Trajectory ranking with ranking noise at h=96
# Tests whether noising energy head's view of hidden states breaks the step-index shortcut.
# Uses elw=0.05 (reduced from R2c-h96's 0.1 to limit reconstruction impact).
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.05
  ranking_margin: 0.1
  ranking_noise_sigma: 0.01

loops: 8
num_layers: 1
hidden_size: 96
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

energy_head_type: position_mlp
energy_head_hidden: 32

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
