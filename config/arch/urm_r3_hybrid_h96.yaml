# R3: Hybrid URM + MCMC at h=96
# 5 URM steps + 3 MCMC steps = 8 total (matched compute with R1-h96)
# Energy head trained purely through MCMC reconstruction loss via create_graph=True.
# No trajectory ranking — energy learns from its own optimization landscape.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 96
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: hybrid
stopping: qhalt
ranking: qhalt

# MCMC config
mcmc_start_step: 5
mcmc_step_size: 0.01
mcmc_langevin_noise: 0.003
mcmc_random_step_size: true

# Linear energy head (mean pool → Linear(96, 1))
energy_head_type: linear

ema: True
ema_rate: 0.999
