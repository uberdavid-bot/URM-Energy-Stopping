# R4b: Exclusive Self-Attention (XSA) at h=96
# Self-attention diagonal masked (a_ii = 0); each token attends exclusively to OTHER tokens.
# Hypothesis: removing self-attention concentration sharpens hidden state representations,
# plausibly compounding across recurrence steps.
# Implementation: SDPA fallback (flash_attn lacks arbitrary mask support); ~10-20% throughput hit.
# No registers (clean isolation: test XSA independently first).
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 96
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

exclusive_attention: true

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
