# R4d — width probe at h=128, loops=8
# Identical to R1-h96 baseline except hidden_size=128.
# Tests whether capacity (not refinement budget) is the h=96 bottleneck
# after R4c showed clean delta-norm decay but eval regression under loops=16.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
