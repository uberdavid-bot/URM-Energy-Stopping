# R4f — h=128 + stronger regularization (dropout 0.15, wd 0.15)
# Identical to R4d except attn_dropout/mlp_dropout bumped to 0.15.
# weight_decay=0.15 is applied on the CLI in the master script (not in the arch config).
# Tests whether the R4c-style train/eval gap at the next width up is regularizable.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.15
mlp_dropout: 0.15
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
