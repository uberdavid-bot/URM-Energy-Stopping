# R5b — loops=16 at h=128
# Re-runs the R4c diagnostic (extended refinement budget) at +1 width.
# Tests whether R4c's -2.21pp eval drop at h=96 was capacity-specific or
# a general pathology of extended refinement.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 16
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 16

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
