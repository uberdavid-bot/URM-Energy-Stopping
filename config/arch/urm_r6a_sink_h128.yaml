# R6a — Attention sink logits at h=128
# Per-head learnable scalar in softmax denominator. Allows attention to sum to <1 per head.
# Hypothesis: during early recurrence steps, sink logits let heads express "nothing relevant"
# and dampen signal when unconfident. May accelerate early-step convergence.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

attention_sink: true

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
