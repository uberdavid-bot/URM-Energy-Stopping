# R6g — Partial RoPE (50%) at h=128
# Apply RoPE to only the last 50% of each head's dimensions.
# The first 50% does pure content-based attention.
# Hypothesis: content-only dimensions let the model attend based on "what's here now"
# regardless of position, while RoPE dimensions handle "where is it."
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

rope_fraction: 0.5

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
