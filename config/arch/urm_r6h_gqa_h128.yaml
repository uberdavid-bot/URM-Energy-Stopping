# R6h — GQA (8 query heads, 2 KV heads) at h=128
# 8 query heads sharing 2 KV heads. head_dim=16 for all.
# Tests diverse Q patterns with shared factual KV retrieval.
# Hypothesis: consistent factual retrieval (shared KV) with diverse
# interpretation (many Q heads) may benefit recurrence.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 8
num_kv_heads: 2
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

ema: True
ema_rate: 0.999
