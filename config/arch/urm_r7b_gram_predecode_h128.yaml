# R7b — GRAM with pre-eps decode (fixes R7a posterior leak)
# Structural fix: decode logits from deterministic state BEFORE eps injection,
# so eps_t can only influence FUTURE steps' predictions (after at least one
# transformer pass mixes it), never step t's own decoded output.
# R7a leaked because the posterior encoded target info into eps_t, which was
# injected BEFORE the transformer pass and immediately decoded.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

gram_enabled: true
gram_beta: 0.1
gram_mlp_hidden: 64
gram_num_samples: 8
gram_predecode: true
gram_detach_posterior_recon: false

ema: True
ema_rate: 0.999
