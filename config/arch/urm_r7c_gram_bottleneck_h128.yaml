# R7c — GRAM with per-example bottleneck latent (fixes R7a/R7b capacity leak)
# R7a/R7b used per-position full-H eps ([B, P+seq, H]) — enough capacity to encode
# the entire 100-token target. R7c uses a per-example k=16 latent ([B, k]) projected
# up and broadcast across positions. The bottleneck can steer trajectories but
# physically cannot memorize a full grid.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

gram_enabled: true
gram_beta: 0.1
gram_mlp_hidden: 64
gram_num_samples: 8
gram_latent_dim: 16
gram_predecode: true
gram_detach_posterior_recon: true

ema: True
ema_rate: 0.999
