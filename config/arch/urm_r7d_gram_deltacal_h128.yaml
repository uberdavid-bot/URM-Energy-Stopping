# R7d — Delta-norm-calibrated sigma for GRAM stochastic latent transitions.
# Fixes R7c2 anti-refinement: sigma is now proportional to alpha * ||delta_t||
# instead of a flat learned value. Provides calibration (eps is a small fraction
# of the update) and annealing (sigma shrinks as trajectory converges).
# All other settings identical to R7c2 warmup variant.
name: urm.urm_energy@ARCModel
loss:
  name: losses@EnergyLossHead
  loss_type: stablemax_cross_entropy
  energy_loss_weight: 0.0
  ranking_margin: 0.1

loops: 8
num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1
recurrence_noise: 0.0

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

energy_threshold: 0.005
min_steps: 8

refinement: urm
stopping: qhalt
ranking: qhalt

gram_enabled: true
gram_beta: 0.1
gram_mlp_hidden: 64
gram_num_samples: 8
gram_latent_dim: 16
gram_predecode: true
gram_detach_posterior_recon: false
gram_kl_warmup_steps: 1500
gram_free_bits: 0.0
gram_sigma_alpha: 0.2

ema: True
ema_rate: 0.999
