# R8a — H/L hierarchical structure with paper-faithful deep supervision (deterministic).
# Two SEPARATE modules fL/fH, each one ARCBlock at h=128 (same block config as R4d).
# One supervision step = hl_T=2 cycles of (hl_K=3 fL evals + 1 fH eval), decoded ONCE
# from h. TRM training recipe (pretrain.train_batch_hl): n_sup=4 supervision steps per
# batch, backward + optimizer step per supervision step, (h, l) carry detached between
# steps. Q-halt is trained (halt-only BCE) but never gates execution — compute is
# deterministic. No noise injection.
# Budget: same number of BATCHES as R4d's 80K run => 4x optimizer steps, ~4x wall-clock.
name: urm.urm_hl@HLModel
loss:
  name: losses@HLLossHead
  loss_type: stablemax_cross_entropy

num_layers: 1
hidden_size: 128
num_heads: 4
expansion: 2

attn_dropout: 0.1
mlp_dropout: 0.1

puzzle_emb_ndim: ${.hidden_size}
pos_encodings: rope

hl_T: 2
hl_K: 3
n_sup: 4

ema: True
ema_rate: 0.999
